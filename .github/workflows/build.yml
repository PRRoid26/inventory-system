name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r frontend/requirements.txt

      - name: Build .exe
        working-directory: frontend
        run: pyinstaller FugroInventory.spec --distpath dist --workpath build --noconfirm

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: FugroInventory-Windows
          path: frontend/dist/FugroInventory.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 \
            libgl1-mesa-glx libegl1 \
            imagemagick wget fuse

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r frontend/requirements.txt

      - name: Build binary
        working-directory: frontend
        run: pyinstaller FugroInventory.spec --distpath dist --workpath build --noconfirm

      - name: Build AppImage
        working-directory: frontend
        run: bash build_appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: FugroInventory-Linux
          path: frontend/FugroInventory-*.AppImage
